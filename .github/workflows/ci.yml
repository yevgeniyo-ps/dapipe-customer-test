name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: DaPipe Setup
        env:
          DAPIPE_API_KEY: ${{ secrets.DAPIPE_API_KEY }}
          DAPIPE_MODE: restrict
        run: curl -sf -H "x-dapipe-api-key:$DAPIPE_API_KEY" https://app.dapipe.io/api/v1/setup | bash

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm init -y && npm install lodash express
      - run: echo "Build complete!"

      - name: Simulated attack
        run: |
          # Allowed domain — should pass
          curl -sf --max-time 3 https://allowed-test.com 2>/dev/null || true
          curl -sf --max-time 3 http://allowed-test.com 2>/dev/null || true

          # Blocked domain — should be blocked
          curl -sf --max-time 3 https://blocked-test.com 2>/dev/null || true
          curl -sf --max-time 3 http://blocked-test.com 2>/dev/null || true

          # Blocked IP — should be blocked
          curl -sf --max-time 3 https://1.1.1.1 2>/dev/null || true
          curl -sf --max-time 3 http://1.1.1.1 2>/dev/null || true

      - name: DaPipe Analyze
        if: always()
        env:
          DAPIPE_API_KEY: ${{ secrets.DAPIPE_API_KEY }}
        run: curl -sf -H "x-dapipe-api-key:$DAPIPE_API_KEY" https://app.dapipe.io/api/v1/analyze | bash
