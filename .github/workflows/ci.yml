name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: DaPipe Setup
        env:
          DAPIPE_API_KEY: ${{ secrets.DAPIPE_API_KEY }}
          DAPIPE_MODE: restrict
        run: curl -sf -H "x-dapipe-api-key:$DAPIPE_API_KEY" https://app.dapipe.io/api/v1/setup | bash

      - name: Simulated traffic
        run: |
          test_connection() {
            local url="$1"
            if curl -sf --max-time 3 "$url" >/dev/null 2>&1; then
              echo "✅ CONNECTED: $url"
            else
              echo "❌ BLOCKED:   $url"
            fi
          }

          echo "=== Allowed domain (foo.com) ==="
          test_connection https://foo.com
          test_connection http://foo.com

          echo ""
          echo "=== Blocked domain (bar.com) ==="
          test_connection https://bar.com
          test_connection http://bar.com

          echo ""
          echo "=== Blocked IP (1.1.1.1) ==="
          test_connection https://1.1.1.1
          test_connection http://1.1.1.1

      - name: DaPipe Analyze
        if: always()
        env:
          DAPIPE_API_KEY: ${{ secrets.DAPIPE_API_KEY }}
        run: curl -sf -H "x-dapipe-api-key:$DAPIPE_API_KEY" https://app.dapipe.io/api/v1/analyze | bash
