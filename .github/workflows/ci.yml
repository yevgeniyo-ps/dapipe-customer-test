name: CI

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'DaPipe mode'
        required: true
        type: choice
        options:
          - restrict
          - monitor
        default: restrict

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: DaPipe Setup
        env:
          DAPIPE_API_KEY: ${{ secrets.DAPIPE_API_KEY }}
          DAPIPE_MODE: ${{ inputs.mode }}
        run: curl -sf -H "x-dapipe-api-key:$DAPIPE_API_KEY" https://app.dapipe.io/api/v1/setup | bash

      - name: Simulated traffic
        run: |
          test_connection() {
            local url="$1"
            local output
            output=$(curl -v --max-time 5 "$url" 2>&1 || true)
            if echo "$output" | grep -q "Could not resolve\|EAI_FAIL\|Connection refused"; then
              echo "🛡️  BLOCKED BY DAPIPE: $url"
            elif echo "$output" | grep -q "HTTP/"; then
              echo "✅ CONNECTED:         $url"
            else
              echo "⚠️  FAILED (network):  $url"
            fi
          }

          echo "=== Allowed (should connect) ==="
          test_connection https://example.com

          echo ""
          echo "=== Blocked domains (should be blocked in restrict) ==="
          test_connection https://icanhazip.com

          echo ""
          echo "=== Blocked IP (should be blocked in restrict) ==="
          test_connection http://8.8.8.8

      - name: DaPipe Analyze
        if: always()
        env:
          DAPIPE_API_KEY: ${{ secrets.DAPIPE_API_KEY }}
        run: curl -sf -H "x-dapipe-api-key:$DAPIPE_API_KEY" https://app.dapipe.io/api/v1/analyze | bash
