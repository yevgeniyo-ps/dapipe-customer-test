name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: DaPipe Setup
        env:
          DAPIPE_API_KEY: ${{ secrets.DAPIPE_API_KEY }}
          DAPIPE_MODE: restrict
        run: curl -sf -H "x-dapipe-api-key:$DAPIPE_API_KEY" https://app.dapipe.io/api/v1/setup | bash

      - name: Simulated traffic
        run: |
          # Allowed domain — should pass
          curl -sf --max-time 3 https://foo.com 2>/dev/null || true
          curl -sf --max-time 3 http://foo.com 2>/dev/null || true

          # Blocked domain — should be blocked
          curl -sf --max-time 3 https://bar.com 2>/dev/null || true
          curl -sf --max-time 3 http://bar.com 2>/dev/null || true

          # Blocked IP — should be blocked
          curl -sf --max-time 3 https://1.1.1.1 2>/dev/null || true
          curl -sf --max-time 3 http://1.1.1.1 2>/dev/null || true

      - name: DaPipe Analyze
        if: always()
        env:
          DAPIPE_API_KEY: ${{ secrets.DAPIPE_API_KEY }}
        run: curl -sf -H "x-dapipe-api-key:$DAPIPE_API_KEY" https://app.dapipe.io/api/v1/analyze | bash
